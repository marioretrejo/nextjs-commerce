# PodDisruptionBudgets: ensure at least 1 replica of each critical workload
# survives voluntary disruptions (node drain, cluster upgrades, etc.)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: voice-orchestrator-pdb
  namespace: voice-agent
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: voice-orchestrator
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nextjs-app-pdb
  namespace: voice-agent
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: nextjs-app
