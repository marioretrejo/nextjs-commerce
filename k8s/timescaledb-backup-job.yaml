# Daily pg_dump backup of TimescaleDB to S3.
# Requires:
#   - AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY in 'backup-secrets'
#   - S3_BUCKET env var pointing to your backup bucket
#   - awscli container image
apiVersion: batch/v1
kind: CronJob
metadata:
  name: timescaledb-backup
  namespace: voice-agent
spec:
  schedule: "0 3 * * *"        # 03:00 UTC daily
  concurrencyPolicy: Forbid     # skip if previous backup is still running
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-dump
              image: postgres:15-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: voice-agent-secrets
                      key: DB_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-secrets
                      key: AWS_SECRET_ACCESS_KEY
                - name: S3_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: voice-agent-config
                      key: BACKUP_S3_BUCKET
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  FILE="/tmp/backup_${TIMESTAMP}.sql.gz"

                  echo "Starting pg_dump at ${TIMESTAMP}..."
                  pg_dump \
                    -h timescaledb.voice-agent.svc.cluster.local \
                    -U voice_agent_user \
                    -d voice_agent \
                    --no-password \
                    | gzip > "$FILE"

                  echo "Uploading to s3://${S3_BUCKET}/timescaledb/..."
                  # Install awscli if not present in image
                  apk add --no-cache aws-cli 2>/dev/null || true
                  aws s3 cp "$FILE" "s3://${S3_BUCKET}/timescaledb/backup_${TIMESTAMP}.sql.gz" \
                    --storage-class STANDARD_IA

                  echo "Backup complete: backup_${TIMESTAMP}.sql.gz"
                  rm -f "$FILE"
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "1Gi"
