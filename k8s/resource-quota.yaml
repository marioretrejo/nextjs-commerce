# ResourceQuota: cap total resource consumption in the voice-agent namespace
# to prevent runaway pods from starving other workloads on the cluster.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: voice-agent-quota
  namespace: voice-agent
spec:
  hard:
    requests.cpu:    "20"
    requests.memory: "40Gi"
    limits.cpu:      "60"
    limits.memory:   "80Gi"
    pods:            "100"
    services:        "20"
    persistentvolumeclaims: "10"
---
# LimitRange: set per-container defaults so pods without explicit
# resource specs don't get scheduled unbounded.
apiVersion: v1
kind: LimitRange
metadata:
  name: voice-agent-limits
  namespace: voice-agent
spec:
  limits:
    - type: Container
      default:
        cpu:    "500m"
        memory: "256Mi"
      defaultRequest:
        cpu:    "100m"
        memory: "128Mi"
      max:
        cpu:    "4"
        memory: "8Gi"
      min:
        cpu:    "50m"
        memory: "64Mi"
