# ConfigMap – non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: voice-agent-config
  namespace: voice-agent
data:
  ORCHESTRATOR_WS_URL: "ws://voice-orchestrator-svc.voice-agent.svc.cluster.local"
  NEXTJS_WEBHOOK_URL:  "http://nextjs-svc.voice-agent.svc.cluster.local/api/voice/webhook"
  LOG_LEVEL:           "info"
---
# Secret – template only; fill values via CI/CD (never commit real values)
# Use: kubectl create secret generic voice-agent-secrets --from-env-file=.env.prod -n voice-agent
apiVersion: v1
kind: Secret
metadata:
  name: voice-agent-secrets
  namespace: voice-agent
type: Opaque
stringData:
  DATABASE_URL:               "postgres://user:pass@timescaledb:5432/voice_agent?sslmode=require"
  DB_USER:                    "voice_agent_user"
  DB_PASSWORD:                "REPLACE_ME"
  JWT_SECRET:                 "REPLACE_ME"
  DEEPGRAM_API_KEY:           "REPLACE_ME"
  OPENAI_API_KEY:             "REPLACE_ME"
  ELEVENLABS_API_KEY:         "REPLACE_ME"
  ELEVENLABS_VOICE_ID:        "REPLACE_ME"
  PINECONE_API_KEY:           "REPLACE_ME"
  PINECONE_INDEX_HOST:        "REPLACE_ME"
  ORCHESTRATOR_API_KEY:       "REPLACE_ME"
  ORCHESTRATOR_WEBHOOK_SECRET: "REPLACE_ME"
  INTERNAL_SERVICE_TOKEN:     "REPLACE_ME"
