# TimescaleDB StatefulSet (production: use managed RDS or Timescale Cloud instead)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: timescaledb
  namespace: voice-agent
spec:
  serviceName: timescaledb-headless
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
        - name: timescaledb
          image: timescale/timescaledb-ha:pg15-latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: voice_agent
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - voice_agent_user
                - -d
                - voice_agent
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - voice_agent_user
                - -d
                - voice_agent
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsUser: 999         # postgres user
            allowPrivilegeEscalation: false
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: voice-agent
spec:
  selector:
    app: timescaledb
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None   # headless service for StatefulSet DNS
