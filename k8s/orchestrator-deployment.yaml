# Go Voice Orchestrator – Deployment + Service
# Scales horizontally based on active SIP channel count via KEDA custom metrics.
# Each pod handles N concurrent WebSocket sessions (goroutine-per-call model).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-orchestrator
  namespace: voice-agent
  labels:
    app: voice-orchestrator
    component: core
spec:
  replicas: 2                        # minimum; HPA manages the ceiling
  selector:
    matchLabels:
      app: voice-orchestrator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0              # zero-downtime rolling deploys
      maxSurge: 1
  template:
    metadata:
      labels:
        app: voice-orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60   # allow in-flight calls to finish
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: voice-orchestrator
                topologyKey: kubernetes.io/hostname
      containers:
        - name: orchestrator
          image: ghcr.io/marioretrejo/voice-orchestrator:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: DATABASE_URL
            - name: DEEPGRAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: DEEPGRAM_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: OPENAI_API_KEY
            - name: ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: ELEVENLABS_API_KEY
            - name: ELEVENLABS_VOICE_ID
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: ELEVENLABS_VOICE_ID
            - name: PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: PINECONE_API_KEY
            - name: PINECONE_INDEX_HOST
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: PINECONE_INDEX_HOST
            - name: ORCHESTRATOR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: ORCHESTRATOR_API_KEY
            - name: ORCHESTRATOR_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: ORCHESTRATOR_WEBHOOK_SECRET
            - name: NEXTJS_WEBHOOK_URL
              valueFrom:
                configMapKeyRef:
                  name: voice-agent-config
                  key: NEXTJS_WEBHOOK_URL
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                # Drain new connections; allow up to 55s for calls to finish
                command: ["/bin/sh", "-c", "sleep 55"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: voice-orchestrator
---
apiVersion: v1
kind: Service
metadata:
  name: voice-orchestrator-svc
  namespace: voice-agent
  labels:
    app: voice-orchestrator
spec:
  selector:
    app: voice-orchestrator
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
