# Next.js Application – Deployment + Service + Ingress
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-app
  namespace: voice-agent
  labels:
    app: nextjs-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nextjs-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 2
  template:
    metadata:
      labels:
        app: nextjs-app
    spec:
      containers:
        - name: nextjs
          image: ghcr.io/marioretrejo/nextjs-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: JWT_SECRET
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: OPENAI_API_KEY
            - name: ORCHESTRATOR_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: voice-agent-config
                  key: ORCHESTRATOR_WS_URL
            - name: ORCHESTRATOR_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: ORCHESTRATOR_WEBHOOK_SECRET
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: voice-agent-secrets
                  key: INTERNAL_SERVICE_TOKEN
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/auth/me
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/auth/me
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nextjs-svc
  namespace: voice-agent
spec:
  selector:
    app: nextjs-app
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voice-agent-ingress
  namespace: voice-agent
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # WebSocket support for the orchestrator
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.yourdomain.com
      secretName: voice-agent-tls
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          # WebSocket traffic → orchestrator
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: voice-orchestrator-svc
                port:
                  number: 80
          # REST/dashboard traffic → Next.js
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextjs-svc
                port:
                  number: 80
