# Network Policies – zero-trust microsegmentation for the voice-agent namespace.
#
# Default posture: deny all ingress and egress.
# Explicit allow rules are added below for each required traffic path.
#
#  ┌──────────┐  ws/:80   ┌──────────────┐  :5432   ┌────────────┐
#  │  Ingress │ ────────► │ orchestrator │ ────────► │ timescaledb│
#  │  (nginx) │           └──────────────┘           └────────────┘
#  └──────────┘  http/:80  ┌──────────────┐
#                ────────► │   nextjs     │ ────────► timescaledb :5432
#                          └──────────────┘
#                               │ http/:3000
#                               ▼ (internal webhook)
#                          orchestrator :8080

# ── Default deny all ingress ──────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: voice-agent
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# ── Default deny all egress ───────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: voice-agent
spec:
  podSelector: {}
  policyTypes:
    - Egress
---
# ── Allow DNS resolution from all pods ───────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: voice-agent
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ── Ingress controller → orchestrator (WebSocket) ────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-orchestrator
  namespace: voice-agent
spec:
  podSelector:
    matchLabels:
      app: voice-orchestrator
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8080
---
# ── Ingress controller → nextjs ──────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-nextjs
  namespace: voice-agent
spec:
  podSelector:
    matchLabels:
      app: nextjs-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
---
# ── Orchestrator internal webhook → nextjs ───────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-orchestrator-to-nextjs
  namespace: voice-agent
spec:
  podSelector:
    matchLabels:
      app: nextjs-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: voice-orchestrator
      ports:
        - port: 3000
---
# ── Orchestrator → TimescaleDB ────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-orchestrator-db-egress
  namespace: voice-agent
spec:
  podSelector:
    matchLabels:
      app: voice-orchestrator
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: timescaledb
      ports:
        - port: 5432
---
# ── Nextjs → TimescaleDB ──────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nextjs-db-egress
  namespace: voice-agent
spec:
  podSelector:
    matchLabels:
      app: nextjs-app
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: timescaledb
      ports:
        - port: 5432
---
# ── TimescaleDB: accept connections from app pods only ────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-ingress
  namespace: voice-agent
spec:
  podSelector:
    matchLabels:
      app: timescaledb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: voice-orchestrator
        - podSelector:
            matchLabels:
              app: nextjs-app
      ports:
        - port: 5432
---
# ── Allow external API egress for orchestrator (Deepgram, OpenAI, ElevenLabs, Pinecone) ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-orchestrator-external-egress
  namespace: voice-agent
spec:
  podSelector:
    matchLabels:
      app: voice-orchestrator
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443   # HTTPS only
---
# ── Allow nextjs external API egress (OpenAI for post-call analysis) ──────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nextjs-external-egress
  namespace: voice-agent
spec:
  podSelector:
    matchLabels:
      app: nextjs-app
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
