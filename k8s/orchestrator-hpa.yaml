# Horizontal Pod Autoscaler – Voice Orchestrator
#
# Primary scaling signal: active_sip_channels (custom Prometheus metric)
# exported by each pod at /metrics and aggregated by Prometheus Adapter.
#
# Secondary signal: CPU (fallback if custom metric is unavailable).
#
# Scale-out: add a pod when avg active channels > 80 per pod.
# Scale-in:  remove a pod when avg active channels < 20 per pod.
# Cooldown:  5 min scale-in stabilization to avoid thrashing during call ends.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: voice-orchestrator-hpa
  namespace: voice-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: voice-orchestrator
  minReplicas: 2
  maxReplicas: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4                   # add up to 4 pods per scale event
          periodSeconds: 60
        - type: Percent
          value: 50                  # or 50% of current replica count
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300  # 5-min cooldown on scale-in
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
  metrics:
    # Custom metric: sum of active WebSocket/SIP sessions reported by pods
    - type: Pods
      pods:
        metric:
          name: active_sip_channels_total
        target:
          type: AverageValue
          averageValue: "80"         # target 80 concurrent channels per pod
    # CPU fallback
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
