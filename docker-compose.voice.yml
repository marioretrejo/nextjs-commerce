# Local development stack for the voice agent infrastructure.
# Usage: docker compose -f docker-compose.voice.yml up
version: "3.9"

services:
  # ── TimescaleDB ────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb-ha:pg15-latest
    environment:
      POSTGRES_DB:       voice_agent
      POSTGRES_USER:     voice_agent_user
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./prisma/migrations/voice_agent_schema.sql:/docker-entrypoint-initdb.d/01_voice_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voice_agent_user -d voice_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (session/rate-limiting cache) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ── Go Voice Orchestrator ─────────────────────────────────────────────────
  orchestrator:
    build:
      context: ./voice-orchestrator
      dockerfile: Dockerfile
    environment:
      PORT:                      "8080"
      DATABASE_URL:              "postgres://voice_agent_user:localpassword@timescaledb:5432/voice_agent?sslmode=disable"
      DEEPGRAM_API_KEY:          "${DEEPGRAM_API_KEY}"
      OPENAI_API_KEY:            "${OPENAI_API_KEY}"
      ELEVENLABS_API_KEY:        "${ELEVENLABS_API_KEY}"
      ELEVENLABS_VOICE_ID:       "${ELEVENLABS_VOICE_ID}"
      PINECONE_API_KEY:          "${PINECONE_API_KEY}"
      PINECONE_INDEX_HOST:       "${PINECONE_INDEX_HOST}"
      ORCHESTRATOR_API_KEY:      "${ORCHESTRATOR_API_KEY:-dev-secret}"
      ORCHESTRATOR_WEBHOOK_SECRET: "${ORCHESTRATOR_WEBHOOK_SECRET:-dev-webhook-secret}"
      NEXTJS_WEBHOOK_URL:        "http://nextjs:3000/api/voice/webhook"
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js App ───────────────────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL:               "postgres://voice_agent_user:localpassword@timescaledb:5432/voice_agent?sslmode=disable"
      JWT_SECRET:                 "${JWT_SECRET:-dev-jwt-secret}"
      OPENAI_API_KEY:             "${OPENAI_API_KEY}"
      ORCHESTRATOR_WS_URL:        "ws://orchestrator:8080"
      ORCHESTRATOR_WEBHOOK_SECRET: "${ORCHESTRATOR_WEBHOOK_SECRET:-dev-webhook-secret}"
      INTERNAL_SERVICE_TOKEN:     "${INTERNAL_SERVICE_TOKEN:-dev-internal-token}"
      NODE_ENV:                   "production"
    ports:
      - "3000:3000"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

volumes:
  timescale_data:
  grafana_data:
